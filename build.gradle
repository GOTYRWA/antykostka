plugins {
    id 'fabric-loom' version '1.1.0'
}

minecraft {
    // the version of Minecraft to target
    version '1.21.4'
}

dependencies {
    // compile only dependency on the Fabric API
    modCompile "net.fabricmc:fabric-api:${project.version}"
}

repositories {
    maven { url = 'https://maven.fabricmc.net/' }
}
